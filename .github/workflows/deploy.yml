name: Deploy to GitHub Pages

# Auto-deploy index.html + sibling files to GitHub Pages on every push to main.
# The repo's existing disk-watch autopush keeps index.html in sync from the
# author's laptop; this workflow takes that committed state and serves it.
#
# To enable: in the repo's Settings → Pages, set the source to "GitHub Actions".
# That swaps the legacy branch-based publish for this workflow's artifact upload.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages build at a time. A queued second run on a rapid push burst
# is skipped — GitHub keeps the LATEST and discards in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  ci:
    name: CI checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # Sanity-check the inline JS parses before publishing. Catches typo-grade
      # syntax errors that would brick the live site for everyone.
      - name: Parse-check inline JS
        run: ./tools/parsecheck.sh

      - name: Verify TOC mentions all script sections
        run: ./tools/check-toc.sh

      - name: Validate security headers and CSP
        run: npm run test:security-headers

      - name: Validate environment separation controls
        run: npm run test:environment

      - name: Validate RBAC matrix evidence
        run: npm run test:rbac

      - name: Lint SQL/RLS examples and migrations
        run: npm run test:sql-rls

      - name: Check migration drift guardrails
        run: npm run test:migration-drift

      - name: Check enterprise readiness evidence
        run: npm run test:enterprise

      - name: Run offline load profile
        run: npm run test:load

      # Sanity-check the worker registration + manifest are still valid.
      - name: Validate manifest.webmanifest
        run: |
          python3 -c "import json; json.load(open('manifest.webmanifest'))"

      - name: Smoke-check app shell and privileged gates
        run: node tools/smoke-check.js

      - name: Install browser-test dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Playwright E2E smoke
        run: npm run test:e2e

      - name: Rollback drill dry-run
        run: npm run test:rollback-drill

      - name: Validate edge function TypeScript syntax
        run: |
          set -euo pipefail
          find edge-functions supabase/functions -type f -name index.ts -print0 |
            while IFS= read -r -d '' fn; do
              echo "Checking $fn"
              npx --yes esbuild "$fn" \
                --bundle \
                --platform=neutral \
                --format=esm \
                --target=es2022 \
                "--external:https://*" \
                "--external:jsr:*" \
                --outfile=/tmp/rs-edge-function-check.js >/dev/null
            done

  build:
    name: Build + deploy
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Concatenate src/parts/*.html into index.html (no-op while
      # src/parts is empty; takes ownership progressively as the
      # monolith is broken up). See src/README.md for the migration
      # plan. Today's autoship pipeline keeps working unchanged.
      - name: Build index.html from src/parts
        run: ./tools/build-index.sh

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
