name: Ops Monitor

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ops-monitor
  cancel-in-progress: true

jobs:
  edge-functions:
    name: Supabase edge reachability
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - name: Probe deployed edge functions
        env:
          RS_SUPABASE_URL: ${{ vars.RS_SUPABASE_URL }}
        run: npm run test:edge-monitor
