name: widget-release

on:
  push:
    tags:
      - 'widget-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: widget/package-lock.json
      - run: npm ci
        working-directory: widget
      - run: npx electron-builder --mac --publish never
        working-directory: widget
      - uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: widget/dist/*.dmg
          if-no-files-found: error

  win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: widget/package-lock.json
      - run: npm ci
        working-directory: widget
      - run: npx electron-builder --win --publish never
        working-directory: widget
      - uses: actions/upload-artifact@v4
        with:
          name: win-exe
          path: widget/dist/*.exe
          if-no-files-found: error

  publish:
    needs: [mac, win]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: ./assets
      - uses: actions/download-artifact@v4
        with:
          name: win-exe
          path: ./assets
      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          ls -lh assets/
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" assets/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            VERSION="${TAG#widget-v}"
            gh release create "$TAG" assets/* --repo "$GITHUB_REPOSITORY" --title "Widget $VERSION" --notes "Cross-platform widget installers."
          fi
