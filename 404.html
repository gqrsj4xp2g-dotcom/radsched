<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RadScheduler</title>
<style>
  /* Mirror the app's calm aesthetic so the 404 doesn't feel like a different
     product. System type stack, generous space, single accent. */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif;
    -webkit-font-smoothing: antialiased;
    background: #fafafa;
    color: #0a0a0c;
    display: grid;
    place-items: center;
    padding: 24px;
    letter-spacing: -0.011em;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #0a0a0c; color: #fafafa; }
  }
  main {
    max-width: 360px;
    text-align: center;
  }
  .mark {
    width: 64px; height: 64px;
    margin: 0 auto 28px;
    border-radius: 14px;
    background: #2563eb;
    display: grid; place-items: center;
    color: #fff; font-weight: 600; font-size: 22px;
    letter-spacing: -0.02em;
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.022em;
    margin-bottom: 10px;
  }
  p {
    font-size: 15px;
    line-height: 1.55;
    color: #6b6b70;
    margin-bottom: 24px;
  }
  @media (prefers-color-scheme: dark) {
    p { color: #98989a; }
  }
  a {
    display: inline-block;
    padding: 10px 22px;
    background: #2563eb;
    color: #fff;
    text-decoration: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: -0.011em;
    transition: transform 200ms cubic-bezier(0.4, 0, 0.2, 1),
                background 200ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  a:hover { background: #1d4ed8; }
  a:active { transform: scale(0.98); }
</style>
<!-- Defer to root automatically after a moment so deep-links to old paths
     just work. The link below is the explicit fallback for users who hit
     the page faster than the redirect or have noscript. -->
<meta http-equiv="refresh" content="2;url=/">
</head>
<body>
  <main>
    <div class="mark">RS</div>
    <h1>Page not found</h1>
    <p>The link you followed isn't part of RadScheduler. Taking you back to the dashboard.</p>
    <a href="/">Continue</a>
  </main>
</body>
</html>
