<?xml version="1.0" encoding="UTF-8"?>
<!--
  RadScheduler favicon (v2). Matches the login-card logo design:
  rounded-square blue gradient → stylized calendar with the mid-month
  date highlighted as a radiology scan target (filled dot + concentric
  ring). The single-color "ink" variant is preserved for the
  prefers-color-scheme dark mode so favicons on dark browser themes
  still look right.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 68 68">
  <defs>
    <linearGradient id="rsFavGrad" x1="0" y1="0" x2="68" y2="68" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="0.55" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1e3a5f"/>
    </linearGradient>
  </defs>
  <rect width="68" height="68" rx="14" fill="url(#rsFavGrad)"/>
  <!-- Calendar body -->
  <rect x="14" y="20" width="40" height="34" rx="4" fill="none" stroke="#ffffff" stroke-width="2.4"/>
  <!-- Header bar tint -->
  <path d="M14 24 a4 4 0 0 1 4 -4 h32 a4 4 0 0 1 4 4 v4 h-40z" fill="#ffffff" fill-opacity="0.18"/>
  <line x1="14" y1="28" x2="54" y2="28" stroke="#ffffff" stroke-width="2.4"/>
  <!-- Ring tabs -->
  <line x1="24" y1="14" x2="24" y2="24" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <line x1="44" y1="14" x2="44" y2="24" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <!-- Marked date — radiology scan target -->
  <circle cx="34" cy="41.5" r="4.6" fill="#ffffff"/>
  <circle cx="34" cy="41.5" r="7.8" fill="none" stroke="#ffffff" stroke-width="1.3" stroke-opacity="0.6"/>
  <!-- Companion date dots -->
  <circle cx="22" cy="41.5" r="1.6" fill="#ffffff" fill-opacity="0.55"/>
  <circle cx="46" cy="41.5" r="1.6" fill="#ffffff" fill-opacity="0.55"/>
</svg>
