<?xml version="1.0" encoding="UTF-8"?>
<!--
  RadScheduler favicon.
  Designed flat, monoline, calm. The dot in the lower-right is a status
  signal — "the schedule is set." On dark backgrounds this reverses
  gracefully via the prefers-color-scheme block below.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    .surface { fill: #0a0a0c; }
    .ink { fill: none; stroke: #fafafa; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    .accent { fill: #2563eb; }
    @media (prefers-color-scheme: light) {
      .surface { fill: #fafafa; }
      .ink { stroke: #0a0a0c; }
    }
  </style>
  <rect class="surface" width="64" height="64" rx="14" />
  <!-- A simple, geometric calendar mark — three rows, two columns -->
  <line class="ink" x1="16" y1="22" x2="48" y2="22" />
  <line class="ink" x1="22" y1="14" x2="22" y2="22" />
  <line class="ink" x1="42" y1="14" x2="42" y2="22" />
  <rect class="ink" x="16" y="22" width="32" height="28" rx="3" />
  <line class="ink" x1="32" y1="30" x2="32" y2="50" />
  <line class="ink" x1="16" y1="36" x2="48" y2="36" />
  <line class="ink" x1="16" y1="44" x2="48" y2="44" />
  <!-- Status dot — confidence -->
  <circle class="accent" cx="48" cy="48" r="4" />
</svg>
